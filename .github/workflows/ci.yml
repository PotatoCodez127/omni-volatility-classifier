# .github/workflows/ci.yml
name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-and-test:
    name: Code Quality & Test Automation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Runtime (3.10)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip" # Enables automatic caching of package dependencies

    - name: Upgrade Core Packaging Components
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install Project Architecture & Dev Tools
      run: |
        pip install -e .[dev]

    - name: Verify Code Formatting (Black)
      run: |
        black --check --line-length=100 .

    - name: Audit Code Quality and Imports (Ruff Lint)
      run: |
        ruff check .

    - name: Execute Automated Unit Testing Suite (Pytest)
      run: |
        pytest -v